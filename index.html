<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unlock PDF – EasyUseHub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
}
header{
    background:#fff;
    padding:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}
.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}
#ad-top, #ad-middle{
    background:#eee;
    padding:20px;
    margin:20px 0;
    border-radius:8px;
}
.upload-btn{
    display:inline-block;
    padding:15px 30px;
    background:#2563eb;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    margin:20px 0;
}
.buttons{
    margin-top:10px;
}
.buttons button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:#fff;
}
.tools{ background:#10b981; }
.home{ background:#f59e0b; }
</style>
</head>
<body>

<header>
<h2>Unlock PDF – EasyUseHub</h2>
</header>

<div class="container">

<div id="ad-top">
<strong>Unlock Your PDF</strong> – Remove password protection from your PDF safely.
</div>

<p>Click below to unlock your PDF file</p>

<label class="upload-btn" onclick="loadUnlockWidget()">
Upload File
</label>

<div id="widgetArea" style="margin-top:30px;"></div>

<div id="ad-middle">Middle Ad Placeholder</div>

<!-- All PDF Tools + Home buttons BELOW middle ad -->
<div class="buttons">
<button class="tools" onclick="window.location.href='https://easyusehub.blogspot.com/p/free-pdf-tools-online.html'">
All PDF Tools
</button>
<button class="home" onclick="window.location.href='https://easyusehub.blogspot.com/?m=1'">
Home
</button>
</div>

</div>

<!-- PDF24 official widget -->
<script src="https://tools.pdf24.org/static/js/widget.js"></script>
<script>
function loadUnlockWidget(){
    pdf24.loadWidget('unlock-pdf', {
        containerId: 'widgetArea',
        langCode: 'en',
        widgetConfig: {
            theme: 'lightTheme'
        }
    });
}
</script>

</body>
</html>
